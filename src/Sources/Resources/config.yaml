# Server port (CLIProxyAPI runs on 8318, ThinkingProxy forwards from 8317)
port: 8318

# Bind to localhost only for security (prevents exposure on public IPs)
host: 127.0.0.1

# Management API settings
remote-management:
  allow-remote: false
  secret-key: ""  # Leave empty to disable management API

# Authentication directory (stores OAuth tokens)
auth-dir: "~/.cli-proxy-api"

# Logging configuration
debug: false
logging-to-file: false

# Usage statistics
usage-statistics-enabled: true

# Network proxy (if needed for corporate networks)
proxy-url: ""

# Retry configuration
request-retry: 3

# Timeout for upstream provider requests
# Default: 10m. Set to "0" to disable timeout.
# Important for Extended Thinking requests which may take 5-10+ minutes.
request-timeout: "10m"

# Disable global auth/model cooldown scheduling.
# Prevents long Factory/Droid sessions from hitting blackout windows where every
# Codex/Claude/Gemini auth shows as "auth_unavailable" after a single transient
# failure. See https://github.com/anand-92/droidproxy/issues/57.
disable-cooling: true

# Routing strategy
routing:
  strategy: "round-robin"
  # Pin a session to one upstream auth so stateful Responses API traffic
  # (encrypted reasoning state, previous_response_id) does not break when a
  # follow-up turn would otherwise round-robin to a different account.
  # See https://github.com/anand-92/droidproxy/issues/58.
  session-affinity: true
  session-affinity-ttl: "2h"

# Quota management
quota-exceeded:
  switch-project: true
  switch-preview-model: true

# OAuth providers for local subscriptions
# Claude, Codex (GPT), Gemini tokens in ~/.cli-proxy-api/ will be used
# No fallback - users must authenticate providers they want to use

# No API keys needed for OAuth-based providers
generative-language-api-key: []
