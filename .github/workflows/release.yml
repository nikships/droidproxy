name: Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'create-app-bundle.sh'
      - 'entitlements.plist'
      - 'sparkle-entitlements.plist'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (without leading v). Leave empty to auto-increment patch.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build, Sign, Notarize & Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version
          swift --version

      - name: Import codesigning certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST_VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          BUILD_NUMBER=$(git rev-list --count HEAD)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION} (build ${BUILD_NUMBER})"

      - name: Verify bundled CLIProxyAPI
        id: cliproxy
        run: |
          set -euo pipefail

          # The bundled binary is committed at src/Sources/Resources/cli-proxy-api
          # (bumped by the Update CLIProxyAPI workflow), so we verify the committed
          # binary instead of re-downloading it during the release build.
          BIN="src/Sources/Resources/cli-proxy-api"
          if [ ! -f "$BIN" ]; then
            echo "::error::Bundled CLIProxyAPI binary missing at $BIN"
            exit 1
          fi
          chmod +x "$BIN"

          # `-h` prints the version banner on the first line and exits 0 (running
          # with no args would block trying to start the server).
          OUTPUT=$("$BIN" -h 2>&1 || true)
          VERSION=$(printf '%s\n' "$OUTPUT" | sed -nE 's/.*CLIProxyAPI Version: ([0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?),.*/\1/p' | head -n 1)

          if [ -z "$VERSION" ]; then
            echo "::error::Failed to detect bundled CLIProxyAPI version"
            echo "$OUTPUT"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bundled CLIProxyAPI: $VERSION"
          file "$BIN"

      - name: Build app bundle
        env:
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          TARGET_ARCH: arm64
        run: |
          chmod +x create-app-bundle.sh
          ./create-app-bundle.sh

      - name: Verify code signature
        run: |
          codesign --verify --deep --strict --verbose=2 DroidProxy.app
          spctl -a -vvv -t install DroidProxy.app || echo "::warning::Gatekeeper check failed (expected before notarization)"

      - name: Notarize
        run: |
          set -euo pipefail

          ditto -c -k --sequesterRsrc --keepParent "DroidProxy.app" "DroidProxy-notarize.zip"

          SUBMIT_OUTPUT=$(xcrun notarytool submit "DroidProxy-notarize.zip" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --wait --output-format json)

          echo "$SUBMIT_OUTPUT"

          STATUS=$(echo "$SUBMIT_OUTPUT" | jq -r '.status')
          if [ "$STATUS" != "Accepted" ]; then
            SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | jq -r '.id')
            echo "::error::Notarization failed with status: $STATUS"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" || true
            exit 1
          fi

          xcrun stapler staple "DroidProxy.app"
          xcrun stapler validate "DroidProxy.app"
          rm "DroidProxy-notarize.zip"

      - name: Create ZIP
        run: ditto -c -k --sequesterRsrc --keepParent "DroidProxy.app" "DroidProxy-arm64.zip"

      - name: Calculate checksum
        run: shasum -a 256 "DroidProxy-arm64.zip" | tee "DroidProxy-arm64.zip.sha256"

      - name: Sparkle sign
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          SIGN_UPDATE=$(find src/.build -name "sign_update" -type f | grep -v old_dsa | head -n 1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "::error::sign_update not found"
            find src/.build -name "sign_update" -type f
            exit 1
          fi

          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" "DroidProxy-arm64.zip" --ed-key-file -)
          ED_SIGNATURE=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"$//')
          LENGTH=$(stat -f%z "DroidProxy-arm64.zip")

          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Update appcast
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          TODAY=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          ED_SIGNATURE="${{ steps.sparkle.outputs.ed_signature }}"
          LENGTH="${{ steps.sparkle.outputs.length }}"

          cat > /tmp/new_item.xml <<ENDOFITEM
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <pubDate>${TODAY}</pubDate>
                <enclosure url="https://github.com/anand-92/droidproxy/releases/download/v${VERSION}/DroidProxy-arm64.zip"
                           type="application/octet-stream"
                           sparkle:edSignature="${ED_SIGNATURE}"
                           length="${LENGTH}"/>
              </item>
          ENDOFITEM

          sed -i.bak '/<language>en<\/language>/r /tmp/new_item.xml' appcast.xml
          rm -f appcast.xml.bak /tmp/new_item.xml

          head -25 appcast.xml

      - name: Commit appcast and tag
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add appcast.xml
          git commit -m "Update appcast for v${VERSION}" || echo "No appcast changes to commit"
          git pull --rebase origin main
          git push origin main

          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DroidProxy ${{ steps.version.outputs.version }}
          files: |
            DroidProxy-arm64.zip
            DroidProxy-arm64.zip.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## DroidProxy ${{ steps.version.outputs.version }}

            ### Download

            | File | Description |
            |------|-------------|
            | `DroidProxy-arm64.zip` | Apple Silicon (M1/M2/M3/M4) |

            ### Installation

            1. Download `DroidProxy-arm64.zip`
            2. Extract and drag `DroidProxy.app` to Applications
            3. Double-click to launch

            Code signed with Apple Developer ID and notarized.

            ```bash
            shasum -a 256 -c DroidProxy-arm64.zip.sha256
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
